# ================================================================
# Pure 主题个人配置覆盖
# 此文件会自动合并到 themes/pure/_config.yml 之上
# 修改后 hexo generate 即可生效，无需重启
# ================================================================

# 网站图标路径（相对于 source/ 目录）
favicon: /favicon.ico

# Logo 图片路径；留空则显示站点标题文字
logo: /img/zcxx0322.png

# ----------------------------------------------------------------
# 导航菜单（名称: 路径）
# ----------------------------------------------------------------
menu:
  首页: /
  归档: /archives
  标签: /tags
  分类: /categories
  关于: /about

# ----------------------------------------------------------------
# 社交链接（显示在页脚；留空则隐藏）
# ----------------------------------------------------------------
social:
  github: https://github.com/Zcxx0322
  twitter: ""
  email: ""
  rss: ""

# ----------------------------------------------------------------
# 文章设置
# ----------------------------------------------------------------
post:
  excerpt_length: 200
  show_updated: true
  copyright: true
  copyright_text: "转载请注明出处。"
  series:
    enable: true
  outdated:
    enable: true
    days: 365
    basis: date
    message: "技术细节可能随版本变化，请结合当前环境验证。"

# ----------------------------------------------------------------
# 文章目录（TOC）
# ----------------------------------------------------------------
toc:
  enable: true
  max_depth: 3
  number: false

# ----------------------------------------------------------------
# 代码高亮（使用 Hexo 内置 highlight.js）
# ----------------------------------------------------------------
highlight:
  enable: true
  theme: atom-one-dark
  copy_button: true

# ----------------------------------------------------------------
# 数学公式渲染
# ----------------------------------------------------------------
math:
  enable: false
  engine: katex

# ----------------------------------------------------------------
# 图片灯箱（点击放大，纯 JS 无依赖）
# ----------------------------------------------------------------
lightbox:
  enable: true

# ----------------------------------------------------------------
# 本地搜索（需安装 hexo-generator-search 插件）
# ----------------------------------------------------------------
search:
  enable: true
  path: search.xml
  field: post
  content: true

# ----------------------------------------------------------------
# 评论系统（将 enable 设为 true 并选择一个 provider）
# ----------------------------------------------------------------
comments:
  enable: true
  provider: giscus

  # Giscus（基于 GitHub Discussions），前往 https://giscus.app 获取参数
  giscus:
    repo: "Zcxx0322/Zcxx0322.github.io"
    repo_id: "R_kgDOQev4PQ"
    category: "Announcements"
    category_id: "DIC_kwDOQev4Pc4C97e7"
    mapping: pathname
    reactions_enabled: 1
    emit_metadata: 0
    theme: preferred_color_scheme
    lang: zh-CN

  # Waline（自托管评论系统）
  waline:
    server_url: ""
    lang: zh-CN
    comment_count: true
    page_view: false

  # Disqus
  disqus:
    shortname: ""

  # Valine（基于 LeanCloud）
  valine:
    app_id: ""
    app_key: ""
    placeholder: "说点什么吧…"
    avatar: mm
    lang: zh-CN

# ----------------------------------------------------------------
# 站点统计
# ----------------------------------------------------------------
analytics:
  google:
    enable: false
    id: ""
  baidu:
    enable: false
    id: ""
  umami:
    enable: false
    src: ""
    website_id: ""

# ----------------------------------------------------------------
# 深色模式
# ----------------------------------------------------------------
dark_mode:
  enable: true
  default: auto

# ----------------------------------------------------------------
# 页脚
# ----------------------------------------------------------------
footer:
  since: 2024
  last_updated: true
  custom_text: ""
  icp: ""

# ----------------------------------------------------------------
# 关于页（layout: about）
# ----------------------------------------------------------------
about:
  avatar: /img/zcxx0322.png
  name: "Zcxx0322"
  bio: ""
  links:
    github: "https://github.com/Zcxx0322"
    email: "3611744356@qq.com"
    twitter: ""
    website: ""

# ----------------------------------------------------------------
# CDN 覆盖（留空则使用内置默认值）
# ----------------------------------------------------------------
cdn:
  highlight_css: ""
  katex_css: ""
  katex_js: ""
